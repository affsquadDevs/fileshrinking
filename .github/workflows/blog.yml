name: Daily Blog

# Generates N brand-new blog posts with the Claude API (matching the existing
# posts' style + on-page SEO), then writes them into THIS repo's source of truth:
#   • English post   → components/blog/posts/<slug>.tsx
#   • Registry        → lib/blog/registry.ts        (surfaces the post on /blog + sitemap)
#   • Translations   → components/blog/posts/<slug>.<loc>.tsx   (per locale)
#   • Generated index → lib/blog/posts.generated.ts (rebuilt via scripts/gen-i18n.mjs)
# …and commits the changed files to main. That push triggers the production
# deploy and an IndexNow ping for ONLY the affected URLs.
#
# The cron fires daily, but scripts/should-run-blog.mjs gates it down to 2 random
# days per ISO week, so posts are generated only ~twice a week. A manual
# "Run workflow" always generates, regardless of the day.

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC — gated to 2 random days/week below
  workflow_dispatch:
    inputs:
      count:
        description: "How many new posts to generate"
        type: string
        default: "2"

concurrency:
  group: daily-blog
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # On scheduled runs, only proceed on this week's 2 random days. Manual runs
      # skip the gate (always generate).
      - name: Weekly run gate
        id: gate
        run: echo "run=$(node scripts/should-run-blog.mjs)" >> "$GITHUB_OUTPUT"

      - name: Generate posts
        if: github.event_name == 'workflow_dispatch' || steps.gate.outputs.run == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-opus-4-8
        run: node scripts/generate-blog.mjs --count "${{ inputs.count || '2' }}"

      - name: Commit & push (changed files only)
        id: commit
        if: github.event_name == 'workflow_dispatch' || steps.gate.outputs.run == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Record exactly which files changed (for the targeted IndexNow ping),
          # then stage only those paths — never a blanket `git add .`.
          git diff --name-only --diff-filter=AM > /tmp/changed.txt
          echo "Changed files:"
          cat /tmp/changed.txt
          git add -- \
            components/blog/posts \
            lib/blog/registry.ts \
            lib/blog/posts.generated.ts
          if git diff --cached --quiet; then
            echo "No expected blog files changed."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          DATE=$(date -u +%Y-%m-%d)
          git commit -m "blog: add daily posts ($DATE)"
          git push
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      # A push made with GITHUB_TOKEN does NOT trigger indexnow.yml (on: push),
      # so submit the affected URLs here. Map the changed files → public URLs with
      # scripts/changed-urls.mjs (English post + each localized post), then ping
      # IndexNow with ONLY those URLs (never --all). Vercel deploys this push on
      # its own; wait briefly for it to go live first.
      - name: Ping IndexNow (affected URLs only)
        if: steps.commit.outputs.pushed == 'true'
        run: |
          set -euo pipefail
          node scripts/changed-urls.mjs < /tmp/changed.txt > /tmp/urls.txt || true
          if [ ! -s /tmp/urls.txt ]; then
            echo "No content URLs affected — nothing to submit to IndexNow."
            exit 0
          fi
          echo "Affected URLs:"
          cat /tmp/urls.txt
          sleep 90
          xargs --no-run-if-empty node scripts/indexnow.mjs < /tmp/urls.txt
